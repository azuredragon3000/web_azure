<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Prices</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a1a2e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e94560; }
    header .logo { font-size: 1.5rem; font-weight: bold; color: #e94560; }
    nav a { color: #f0f0f0; text-decoration: none; margin-left: 1.5rem; font-size: 0.95rem; transition: color 0.2s; }
    nav a:hover { color: #e94560; }

    main { flex: 1; padding: 2rem 1.5rem; background: linear-gradient(135deg, #1a1a2e 0%, #0f0f0f 100%); }

    .row { display: flex; align-items: center; gap: 0.6rem; max-width: 1100px; margin: 0 auto 0.8rem; flex-wrap: wrap; }

    .live-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    h2 { font-size: 1rem; font-weight: 600; color: #f0b90b; letter-spacing: 1px; text-transform: uppercase; }
    .update-time { font-size: 0.72rem; color: #555; margin-left: auto; }

    .tabs { display: flex; gap: 0.4rem; max-width: 1100px; margin: 0 auto 0.5rem; flex-wrap: wrap; }
    .tab-btn { padding: 0.4rem 1.1rem; border-radius: 20px; border: 1px solid #2a2a4a; background: transparent; color: #888; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: #e94560; border-color: #e94560; color: #fff; font-weight: 600; }
    .tab-btn:hover:not(.active) { border-color: #555; color: #ccc; }

    .subtabs { display: none; gap: 0.3rem; max-width: 1100px; margin: 0 auto 0.8rem; }
    .subtabs.show { display: flex; }
    .subtab-btn { padding: 0.3rem 0.9rem; border-radius: 20px; border: 1px solid #2a2a4a; background: transparent; color: #888; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
    .subtab-btn.active { background: #0f3460; border-color: #4ade80; color: #4ade80; }

    table { width: 100%; border-collapse: collapse; min-width: 820px; }
    .table-wrap { max-width: 1100px; margin: 0 auto; overflow-x: auto; border-radius: 8px; }
    .table-wrap::-webkit-scrollbar { height: 4px; }
    .table-wrap::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }
    thead th { text-align: left; padding: 0.7rem 0.9rem; font-size: 0.7rem; letter-spacing: 1.2px; text-transform: uppercase; color: #555; border-bottom: 1px solid #2a2a4a; white-space: nowrap; }
    thead th:not(:first-child) { text-align: right; }
    tbody tr { border-bottom: 1px solid #1a1a2e; transition: background 0.15s; }
    tbody tr:hover { background: #1a1a2e; }
    tbody td { padding: 0.75rem 0.9rem; font-size: 0.88rem; white-space: nowrap; }

    .coin-cell { display: flex; align-items: center; gap: 0.6rem; }
    .coin-icon { width: 28px; height: 28px; border-radius: 50%; background: #2a2a4a; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold; color: #f0b90b; flex-shrink: 0; }
    .coin-symbol { font-weight: 600; color: #fff; }
    .coin-name { font-size: 0.72rem; color: #555; }

    td.price { text-align: right; font-family: monospace; font-size: 0.95rem; font-weight: 600; color: #fff; transition: color 0.5s; }
    td.mono  { text-align: right; font-family: monospace; font-size: 0.82rem; color: #aaa; }
    td.fee   { text-align: right; font-family: monospace; font-size: 0.82rem; color: #888; }
    td.chg { text-align: right; font-family: monospace; font-weight: 600; font-size: 0.9rem; }
    .up   { color: #4ade80; }
    .down { color: #f87171; }
    .flat { color: #888; }

    /* Positions section */
    .section-label { max-width: 1100px; margin: 0 auto 0.5rem; font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase; color: #555; display: flex; align-items: center; gap: 0.5rem; }
    .section-label span { color: #f0b90b; }
    .pos-wrap { max-width: 1100px; margin: 0 auto 2rem; overflow-x: auto; border-radius: 8px; border: 1px solid #1e3a1e; }
    .pos-wrap::-webkit-scrollbar { height: 4px; }
    .pos-wrap::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }
    .pos-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    .pos-table thead th { text-align: right; padding: 0.6rem 0.9rem; font-size: 0.68rem; letter-spacing: 1.2px; text-transform: uppercase; color: #555; border-bottom: 1px solid #1e3a1e; white-space: nowrap; background: #0a1a0a; }
    .pos-table thead th:first-child { text-align: left; }
    .pos-table tbody tr { border-bottom: 1px solid #0d200d; transition: background 0.15s; }
    .pos-table tbody tr:hover { background: #0d1f0d; }
    .pos-table tbody td { padding: 0.7rem 0.9rem; font-size: 0.88rem; white-space: nowrap; text-align: right; font-family: monospace; }
    .pos-table tbody td:first-child { text-align: left; font-family: 'Segoe UI', sans-serif; }
    .long-badge  { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; background: #1a3a1a; color: #4ade80; font-size: 0.7rem; font-weight: 700; margin-left: 0.4rem; }
    .short-badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; background: #3a1a1a; color: #f87171; font-size: 0.7rem; font-weight: 700; margin-left: 0.4rem; }

    footer { background: #1a1a2e; text-align: center; padding: 1rem; color: #555; font-size: 0.8rem; border-top: 1px solid #2a2a4a; }
    footer a { color: #e94560; text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">MySite</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <!-- ── My Futures Positions ── -->
    <div class="section-label" id="pos-label" style="display:none">
      <span>⚡ My Futures Positions</span>
      <span id="pos-count" style="color:#555"></span>
    </div>
    <div class="pos-wrap" id="pos-wrap" style="display:none">
      <table class="pos-table">
        <thead>
          <tr>
            <th>Coin</th>
            <th>Size</th>
            <th>Entry Price</th>
            <th>Mark Price</th>
            <th>Liq Price</th>
            <th>Unrealized PnL</th>
            <th>ROE %</th>
            <th>Leverage</th>
            <th>Margin Type</th>
          </tr>
        </thead>
        <tbody id="pos-body"></tbody>
      </table>
    </div>

    <div class="row">
      <span class="live-dot"></span>
      <h2 id="table-title">Watchlist</h2>
      <span class="update-time" id="update-time">Connecting...</span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('gainers',this)">🚀 Gainers</button>
      <button class="tab-btn" onclick="switchTab('losers',this)">📉 Losers</button>
    </div>

    <div class="subtabs" id="subtabs">
      <button class="subtab-btn" onclick="switchMarket('spot',this)">Spot</button>
      <button class="subtab-btn active" onclick="switchMarket('futures',this)">Futures</button>
    </div>

    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#&nbsp;Coin</th>
          <th>Price (USDT)</th>
          <th>24h Chg %</th>
          <th>Tick Size</th>
          <th>Min Notional</th>
          <th>Taker Fee</th>
          <th>Maker Fee</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7" style="text-align:center;color:#555;padding:2rem;">Loading...</td></tr>
      </tbody>
    </table>
    </div>
  </main>

  <footer>
    <p>Data from Binance &nbsp;·&nbsp; Hosted on <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
  </footer>

  <script>
    /* ════════════════════════════════════════
       BINANCE API CONFIG — điền key vào đây
       Chỉ dùng Read-Only key + IP restriction
    ════════════════════════════════════════ */
    var BINANCE_API_KEY    = 'tHl5u9mhOd6evvB2eSngyAujMdApyut9XahwU1kJ4B0fQte5jyezFuM2iBK9E5w3';   // ← điền API key
    var BINANCE_SECRET_KEY = 'FDR3m8NcphhyHaJgaKaCMV3B6vBpgViOr9OJemGzw9EYwIaiKi1VJey7EtQHKuCy';   // ← điền Secret key

    /* ── HMAC-SHA256 signing (Web Crypto API) ── */
    async function hmac256(secret, message) {
      var enc  = new TextEncoder();
      var key  = await crypto.subtle.importKey('raw', enc.encode(secret), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
      var sig  = await crypto.subtle.sign('HMAC', key, enc.encode(message));
      return Array.from(new Uint8Array(sig)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    }

    async function binanceAuth(baseUrl, path, params) {
      params = params || {};
      params.timestamp = Date.now();
      var qs  = Object.keys(params).map(function(k){ return k+'='+encodeURIComponent(params[k]); }).join('&');
      var sig = await hmac256(BINANCE_SECRET_KEY, qs);
      var url = baseUrl + path + '?' + qs + '&signature=' + sig;
      var res = await fetch(url, { headers: { 'X-MBX-APIKEY': BINANCE_API_KEY } });
      return res.json();
    }

    /* ── Fetch & render Futures Positions ── */
    async function loadPositions() {
      if (!BINANCE_API_KEY || !BINANCE_SECRET_KEY) return;
      try {
        var data = await binanceAuth('https://fapi.binance.com', '/fapi/v2/positionRisk');
        var open = data.filter(function(p){ return parseFloat(p.positionAmt) !== 0; });

        if (!open.length) return;

        var rows = open.map(function(p) {
          var amt      = parseFloat(p.positionAmt);
          var isLong   = amt > 0;
          var pnl      = parseFloat(p.unRealizedProfit);
          var entry    = parseFloat(p.entryPrice);
          var mark     = parseFloat(p.markPrice);
          var liq      = parseFloat(p.liquidationPrice);
          var lev      = p.leverage;
          var margin   = p.marginType === 'cross' ? 'Cross' : 'Isolated';
          var notional = Math.abs(amt) * mark;
          var roe      = notional > 0 ? (pnl / (notional / parseFloat(lev)) * 100) : 0;
          var lbl      = p.symbol.replace('USDT','');

          return '<tr>'
            + '<td><div style="display:flex;align-items:center;gap:0.4rem;">'
            +   '<div class="coin-icon">' + lbl.substring(0,4) + '</div>'
            +   '<div>'
            +     '<div class="coin-symbol">' + lbl + '</div>'
            +     (isLong ? '<span class="long-badge">LONG</span>' : '<span class="short-badge">SHORT</span>')
            +   '</div>'
            + '</div></td>'
            + '<td>' + Math.abs(amt).toFixed(4) + '</td>'
            + '<td>' + fmtPrice(entry) + '</td>'
            + '<td>' + fmtPrice(mark)  + '</td>'
            + '<td class="' + (liq > 0 ? 'down' : 'flat') + '">' + (liq > 0 ? fmtPrice(liq) : '--') + '</td>'
            + '<td class="' + (pnl >= 0 ? 'up' : 'down') + '">' + (pnl >= 0 ? '+' : '') + pnl.toFixed(2) + ' $</td>'
            + '<td class="' + (roe >= 0 ? 'up' : 'down') + '">' + (roe >= 0 ? '+' : '') + roe.toFixed(2) + '%</td>'
            + '<td>' + lev + 'x</td>'
            + '<td style="color:#888;">' + margin + '</td>'
            + '</tr>';
        });

        document.getElementById('pos-body').innerHTML = rows.join('');
        document.getElementById('pos-count').innerText = '(' + open.length + ' open)';
        document.getElementById('pos-wrap').style.display  = '';
        document.getElementById('pos-label').style.display = '';

        // Refresh positions every 5s
        setTimeout(loadPositions, 5000);
      } catch(e) {
        console.warn('Positions error:', e);
      }
    }

    /* ── Helpers ── */
    function fmtPrice(p) {
      p = parseFloat(p);
      if (p >= 1000) return '$' + p.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
      if (p >= 1)    return '$' + p.toFixed(4);
      return '$' + p.toFixed(6);
    }
    function fmtChg(c) { var v=parseFloat(c); return (v>=0?'+':'') + v.toFixed(2)+'%'; }
    function chgClass(c) { var v=parseFloat(c); return v>0?'up':v<0?'down':'flat'; }

    /* ── State ── */
    var currentTab    = 'gainers';
    var currentMarket = 'futures';

    /* ── Tab switcher ── */
    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('table-title').innerText = tab === 'gainers' ? '🚀 Top Gainers' : '📉 Top Losers';
      loadRanking();
    }

    function switchMarket(market, btn) {
      currentMarket = market;
      document.querySelectorAll('.subtab-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      loadRanking();
    }

    /* ── WATCHLIST ── */
    var COINS = [
      { symbol:'BTCUSDT',  name:'Bitcoin'   },
      { symbol:'ETHUSDT',  name:'Ethereum'  },
      { symbol:'BNBUSDT',  name:'BNB'       },
      { symbol:'SOLUSDT',  name:'Solana'    },
      { symbol:'XRPUSDT',  name:'XRP'       },
      { symbol:'ADAUSDT',  name:'Cardano'   },
      { symbol:'DOGEUSDT', name:'Dogecoin'  },
      { symbol:'AVAXUSDT', name:'Avalanche' },
      { symbol:'DOTUSDT',  name:'Polkadot'  },
      { symbol:'LINKUSDT', name:'Chainlink' }
    ];

    var wState = {};
    COINS.forEach(function(c){ wState[c.symbol] = {price:null, chg:null, prev:null}; });

    function buildWatchlist() {
      var rows = COINS.map(function(coin) {
        var s = wState[coin.symbol];
        var lbl = coin.symbol.replace('USDT','');
        return '<tr>'
          + '<td><div class="coin-cell">'
          +   '<div class="coin-icon">' + lbl.substring(0,4) + '</div>'
          +   '<div><div class="coin-symbol">' + lbl + '</div><div class="coin-name">' + coin.name + '</div></div>'
          + '</div></td>'
          + '<td class="price" id="p-'+coin.symbol+'">' + (s.price ? fmtPrice(s.price) : '--') + '</td>'
          + '<td class="chg '+(s.chg?chgClass(s.chg):'flat')+'" id="c-'+coin.symbol+'">' + (s.chg?fmtChg(s.chg):'--') + '</td>'
          + '</tr>';
      });
      document.getElementById('table-body').innerHTML = rows.join('');
    }

    function updateCell(symbol, price, chg) {
      var s = wState[symbol];
      s.chg = chg;
      if (currentTab !== 'watchlist') { s.price = price; s.prev = price; return; }
      var pEl = document.getElementById('p-'+symbol);
      var cEl = document.getElementById('c-'+symbol);
      if (!pEl) return;
      if (s.prev !== null && price !== s.prev) {
        pEl.className = 'price ' + (price > s.prev ? 'up' : 'down');
        setTimeout(function(){ pEl.className = 'price'; }, 700);
      }
      s.prev = price; s.price = price;
      pEl.innerText = fmtPrice(price);
      cEl.className = 'chg ' + chgClass(chg);
      cEl.innerText = fmtChg(chg);
    }

    var ws;
    function connectWS() {
      var streams = COINS.map(function(c){ return c.symbol.toLowerCase()+'@ticker'; }).join('/');
      ws = new WebSocket('wss://stream.binance.com:9443/stream?streams='+streams);
      ws.onopen = function() {
        document.getElementById('update-time').innerText = 'Live ●';
        document.getElementById('update-time').style.color = '#4ade80';
      };
      ws.onmessage = function(evt) {
        var d = JSON.parse(evt.data).data;
        if (!d) return;
        updateCell(d.s, parseFloat(d.c), d.P);
        if (currentTab === 'watchlist')
          document.getElementById('update-time').innerText = 'Live · '+new Date().toLocaleTimeString();
      };
      ws.onerror = ws.onclose = function() {
        document.getElementById('update-time').style.color = '#555';
        document.getElementById('update-time').innerText = 'Reconnecting...';
        setTimeout(connectWS, 3000);
      };
    }

    function initSnapshot() {
      var symbols = JSON.stringify(COINS.map(function(c){ return c.symbol; }));
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbols='+encodeURIComponent(symbols))
        .then(function(r){ return r.json(); })
        .then(function(data){
          data.forEach(function(t){ updateCell(t.symbol, parseFloat(t.lastPrice), t.priceChangePercent); });
          connectWS();
        })
        .catch(function(){ connectWS(); });
    }

    /* ── GAINERS / LOSERS (Spot or Futures) ── */
    var STABLES = ['USDCUSDT','BUSDUSDT','TUSDUSDT','FDUSDUSDT','USDPUSDT','DAIUSDT','EURUSDT','GBPUSDT','AEURUSDT'];

    // Cache exchangeInfo per market so we only fetch once
    var exInfoCache = { futures: null, spot: null };

    function getExchangeInfo(market) {
      if (exInfoCache[market]) return Promise.resolve(exInfoCache[market]);
      var url = market === 'futures'
        ? 'https://fapi.binance.com/fapi/v1/exchangeInfo'
        : 'https://api.binance.com/api/v3/exchangeInfo';
      return fetch(url)
        .then(function(r){ return r.json(); })
        .then(function(data){
          // Build map: symbol -> { tickSize, minNotional, takerFee, makerFee }
          var map = {};
          (data.symbols || []).forEach(function(s) {
            var tick = '--', minN = '--', taker = '--', maker = '--';
            (s.filters || []).forEach(function(f) {
              if (f.filterType === 'PRICE_FILTER')  tick = parseFloat(f.tickSize);
              if (f.filterType === 'MIN_NOTIONAL')  minN = parseFloat(f.notional || f.minNotional || 0);
            });
            // Futures exchangeInfo has takerCommissionRate / makerCommissionRate
            if (s.takerCommissionRate !== undefined) taker = (parseFloat(s.takerCommissionRate) * 100).toFixed(4) + '%';
            if (s.makerCommissionRate !== undefined) maker = (parseFloat(s.makerCommissionRate) * 100).toFixed(4) + '%';
            // Spot doesn't expose per-symbol fees in public API — show standard
            if (taker === '--' && market === 'spot') { taker = '0.1000%'; maker = '0.1000%'; }
            if (taker === '--' && market === 'futures') { taker = '0.0500%'; maker = '0.0200%'; }
            map[s.symbol] = { tick: tick, minN: minN, taker: taker, maker: maker };
          });
          exInfoCache[market] = map;
          return map;
        });
    }

    function fmtTick(v) {
      if (v === '--') return '--';
      // Strip trailing zeros e.g. 0.10000000 -> 0.1
      return parseFloat(v).toString();
    }

    function fmtMinN(v) {
      if (v === '--' || v === 0) return '--';
      return '$' + parseFloat(v).toLocaleString('en-US', {maximumFractionDigits:2});
    }

    function loadRanking() {
      var isGainers = currentTab === 'gainers';
      var market = currentMarket;
      document.getElementById('update-time').innerText = 'Loading...';
      document.getElementById('update-time').style.color = '#555';
      document.getElementById('table-body').innerHTML =
        '<tr><td colspan="7" style="text-align:center;color:#555;padding:2rem;">Fetching data...</td></tr>';

      var tickerUrl = market === 'futures'
        ? 'https://fapi.binance.com/fapi/v1/ticker/24hr'
        : 'https://api.binance.com/api/v3/ticker/24hr';

      Promise.all([
        fetch(tickerUrl).then(function(r){ return r.json(); }),
        getExchangeInfo(market)
      ])
        .then(function(results) {
          var data   = results[0];
          var exInfo = results[1];

          var list = data.filter(function(t){
            return t.symbol.endsWith('USDT') && STABLES.indexOf(t.symbol) === -1;
          });
          list.sort(function(a,b){
            var diff = parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent);
            return isGainers ? diff : -diff;
          });

          var top20 = list.slice(0, 20);
          var accentColor = isGainers ? '#4ade80' : '#f87171';
          var rows = top20.map(function(t, i) {
            var lbl = t.symbol.replace('USDT','');
            var ei  = exInfo[t.symbol] || { tick:'--', minN:'--', taker:'--', maker:'--' };
            return '<tr>'
              + '<td><div class="coin-cell">'
              +   '<div class="coin-icon" style="color:'+accentColor+';font-size:0.75rem;">'+(i+1)+'</div>'
              +   '<div><div class="coin-symbol">'+lbl+'</div><div class="coin-name">/ USDT</div></div>'
              + '</div></td>'
              + '<td class="price">'+fmtPrice(t.lastPrice)+'</td>'
              + '<td class="chg '+chgClass(t.priceChangePercent)+'">'+fmtChg(t.priceChangePercent)+'</td>'
              + '<td class="mono">'+fmtTick(ei.tick)+'</td>'
              + '<td class="mono">'+fmtMinN(ei.minN)+'</td>'
              + '<td class="fee">'+ei.taker+'</td>'
              + '<td class="fee">'+ei.maker+'</td>'
              + '</tr>';
          });

          document.getElementById('table-body').innerHTML = rows.join('');
          document.getElementById('update-time').innerText = (market==='futures'?'Futures':'Spot') + ' · ' + new Date().toLocaleTimeString();
          document.getElementById('update-time').style.color = '#555';
        })
        .catch(function() {
          document.getElementById('table-body').innerHTML =
            '<tr><td colspan="7" style="text-align:center;color:#f87171;padding:2rem;">Failed to load — try again</td></tr>';
        });
    }

    /* ── Init ── */
    document.getElementById('subtabs').classList.add('show');
    document.getElementById('table-title').innerText = '🚀 Top Gainers';
    loadRanking();
    initSnapshot(); // keep WS alive in background for potential future use
    loadPositions(); // load futures positions if API key is set
  </script>

</body>
</html>
