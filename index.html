<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Prices</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #e94560;
    }

    header .logo { font-size: 1.5rem; font-weight: bold; color: #e94560; }

    nav a {
      color: #f0f0f0;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover { color: #e94560; }

    main {
      flex: 1;
      padding: 2.5rem 1.5rem;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f0f0f 100%);
    }

    .table-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      max-width: 700px;
      margin: 0 auto 1.2rem;
    }

    .table-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0b90b;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .update-time { font-size: 0.75rem; color: #555; margin-left: auto; }

    table {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #555;
      border-bottom: 1px solid #2a2a4a;
    }

    thead th:not(:first-child) { text-align: right; }

    tbody tr {
      border-bottom: 1px solid #1a1a2e;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #1a1a2e; }

    tbody td { padding: 0.85rem 1rem; font-size: 0.95rem; }

    .coin-cell { display: flex; align-items: center; gap: 0.6rem; }

    .coin-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #2a2a4a;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: bold; color: #f0b90b;
      flex-shrink: 0;
    }

    .coin-symbol { font-weight: 600; color: #fff; }
    .coin-name   { font-size: 0.75rem; color: #555; }

    td.price {
      text-align: right;
      font-family: monospace;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      transition: color 0.5s;
    }

    td.chg { text-align: right; font-family: monospace; font-weight: 600; font-size: 0.9rem; }

    .up   { color: #4ade80; }
    .down { color: #f87171; }
    .flat { color: #888; }

    footer {
      background: #1a1a2e;
      text-align: center;
      padding: 1rem;
      color: #555;
      font-size: 0.8rem;
      border-top: 1px solid #2a2a4a;
    }

    footer a { color: #e94560; text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">MySite</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <div class="table-header">
      <span class="live-dot"></span>
      <h2>Crypto Prices</h2>
      <span class="update-time" id="update-time">Connecting...</span>
    </div>

    <table>
      <thead>
        <tr>
          <th>Coin</th>
          <th>Price (USDT)</th>
          <th>24h Chg %</th>
        </tr>
      </thead>
      <tbody id="coin-table-body">
        <tr><td colspan="3" style="text-align:center;color:#555;padding:2rem;">Loading...</td></tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>Data from Binance &nbsp;·&nbsp; Hosted on <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
  </footer>

  <script>
    var COINS = [
      { symbol: 'BTCUSDT',  name: 'Bitcoin',   icon: 'BTC'  },
      { symbol: 'ETHUSDT',  name: 'Ethereum',  icon: 'ETH'  },
      { symbol: 'BNBUSDT',  name: 'BNB',       icon: 'BNB'  },
      { symbol: 'SOLUSDT',  name: 'Solana',    icon: 'SOL'  },
      { symbol: 'XRPUSDT',  name: 'XRP',       icon: 'XRP'  },
      { symbol: 'ADAUSDT',  name: 'Cardano',   icon: 'ADA'  },
      { symbol: 'DOGEUSDT', name: 'Dogecoin',  icon: 'DOGE' },
      { symbol: 'AVAXUSDT', name: 'Avalanche', icon: 'AVAX' },
      { symbol: 'DOTUSDT',  name: 'Polkadot',  icon: 'DOT'  },
      { symbol: 'LINKUSDT', name: 'Chainlink', icon: 'LINK' }
    ];

    // state map: symbol -> { price, chg }
    var state = {};
    COINS.forEach(function(c) { state[c.symbol] = { price: null, chg: null, prev: null }; });

    function fmtPrice(p) {
      if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (p >= 1)    return '$' + p.toFixed(4);
      return '$' + p.toFixed(6);
    }

    function fmtChg(c) {
      var v = parseFloat(c);
      return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
    }

    function chgClass(c) {
      var v = parseFloat(c);
      return v > 0 ? 'up' : v < 0 ? 'down' : 'flat';
    }

    // Build table rows once (initial render)
    function buildTable() {
      var rows = COINS.map(function(coin) {
        return '<tr id="row-' + coin.symbol + '">'
          + '<td><div class="coin-cell">'
          +   '<div class="coin-icon">' + coin.icon.substring(0, 3) + '</div>'
          +   '<div><div class="coin-symbol">' + coin.icon + '</div>'
          +       '<div class="coin-name">' + coin.name + '</div></div>'
          + '</div></td>'
          + '<td class="price" id="p-' + coin.symbol + '">--</td>'
          + '<td class="chg flat" id="c-' + coin.symbol + '">--</td>'
          + '</tr>';
      });
      document.getElementById('coin-table-body').innerHTML = rows.join('');
    }

    // Update only the changed cells (no full re-render)
    function updateCoin(symbol, price, chg) {
      var s = state[symbol];
      var priceEl = document.getElementById('p-' + symbol);
      var chgEl   = document.getElementById('c-' + symbol);
      if (!priceEl || !chgEl) return;

      if (s.prev !== null && price !== s.prev) {
        var flash = price > s.prev ? 'up' : 'down';
        priceEl.className = 'price ' + flash;
        setTimeout(function() { priceEl.className = 'price'; }, 700);
      }
      s.prev  = price;
      s.price = price;
      s.chg   = chg;

      priceEl.innerText = fmtPrice(price);
      chgEl.className   = 'chg ' + chgClass(chg);
      chgEl.innerText   = fmtChg(chg);
    }

    // ── WebSocket: real-time stream ──
    var streams = COINS.map(function(c) { return c.symbol.toLowerCase() + '@ticker'; }).join('/');
    var ws;

    function connectWS() {
      ws = new WebSocket('wss://stream.binance.com:9443/stream?streams=' + streams);

      ws.onopen = function() {
        document.getElementById('update-time').innerText = 'Live ●';
        document.getElementById('update-time').style.color = '#4ade80';
      };

      ws.onmessage = function(evt) {
        var msg = JSON.parse(evt.data);
        var d   = msg.data;
        if (!d) return;
        updateCoin(d.s, parseFloat(d.c), d.P);
        document.getElementById('update-time').innerText = 'Live · ' + new Date().toLocaleTimeString();
      };

      ws.onerror = ws.onclose = function() {
        document.getElementById('update-time').innerText = 'Reconnecting...';
        document.getElementById('update-time').style.color = '#555';
        setTimeout(connectWS, 3000); // reconnect on disconnect
      };
    }

    // ── Initial snapshot via REST so table shows data immediately ──
    function initSnapshot() {
      var symbols = JSON.stringify(COINS.map(function(c) { return c.symbol; }));
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbols=' + encodeURIComponent(symbols))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          data.forEach(function(t) {
            updateCoin(t.symbol, parseFloat(t.lastPrice), t.priceChangePercent);
          });
          connectWS();
        })
        .catch(function() {
          connectWS(); // still try WS even if REST fails
        });
    }

    buildTable();
    initSnapshot();
  </script>

</body>
</html>
